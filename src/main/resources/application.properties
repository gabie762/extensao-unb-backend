spring.application.name=backend
server.port=8080
# MongoDB
spring.data.mongodb.uri=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST:localhost}:${MONGO_PORT:27017}/${MONGO_DATABASE}?authSource=admin
spring.data.mongodb.auto-index-creation=true

jwt.secret=${JWT_SECRET}

FRONTEND_URL=${FRONTEND_URL:http://localhost:3000}
